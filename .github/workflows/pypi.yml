name: Publish Python Package to PyPI

# This workflow runs when a new GitHub Release is created
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vouchers-python
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing via OIDC
      id-token: write
      contents: read
    steps:
      # Step 1: Checkout the source code from the repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2: Set up a Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Step 3: Install the tools required to build the package
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      # Step 4: Build the source distribution and the wheel
      - name: Build package
        run: python -m build

      # Step 5: Publish to PyPI
      # This action uses OIDC to get a short-lived token from PyPI automatically 
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
